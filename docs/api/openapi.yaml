openapi: 3.1.0

info:
  title: SurveyFlow API
  version: 0.1.0
  description: |
    SurveyFlow's HTTP surface.

    Most application behaviour runs through **TanStack Start server functions**,
    not REST — see `AGENTS.md` §9. Server functions are RPC and are not
    described here. This document covers only the endpoints that are
    deliberately HTTP: health checks, webhooks, file responses, and the public
    survey flow that external respondents reach without an account.

    Endpoints marked *planned* are not implemented yet and are listed so the
    contract is agreed before they are built.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://surveyflow.netlify.app
    description: Production

tags:
  - name: System
    description: Liveness and dependency checks.
  - name: Public survey
    description: |
      Reached by respondents without an account. The largest attack surface in
      the product — token-scoped, rate-limited, and never exposing workspace
      metadata, member lists, or other respondents' answers.
  - name: Webhooks
    description: Inbound delivery receipts from external providers.
  - name: Export
    description: File responses that cannot be returned from a server function.

paths:
  /api/health:
    get:
      tags: [System]
      summary: Liveness and dependency check
      description: |
        Always returns 200 while the process is up. A missing or unreachable
        database is reported in the body rather than failing the request, so
        local startup without MongoDB stays possible.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: The process is running.
          content:
            application/json:
              schema:
                type: object
                required: [status, database, uptime]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  database:
                    type: string
                    enum:
                      [connected, connecting, disconnecting, disconnected, unknown]
                    description: Mongoose connection state.
                  uptime:
                    type: integer
                    description: Process uptime in whole seconds.
              examples:
                healthy:
                  summary: Database reachable
                  value: { status: ok, database: connected, uptime: 128 }
                noDatabase:
                  summary: Running without a database
                  value: { status: ok, database: disconnected, uptime: 3 }

  /api/s/{publicId}:
    get:
      tags: [Public survey]
      summary: Fetch a published survey for a respondent (planned)
      description: |
        Returns the **published** version only — never a draft, and never
        workspace metadata. For `access: whitelist` surveys a `token` is
        required and identifies the recipient.
      operationId: getPublicSurvey
      security: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema: { type: string }
        - name: token
          in: query
          required: false
          description: Per-recipient magic-link token. Required when the survey is whitelisted.
          schema: { type: string }
      responses:
        "200":
          description: The published survey definition.
        "401":
          description: A token is required for this survey, or the token is invalid.
        "404":
          description: No such survey, or it is not published.
        "429":
          description: Rate limit exceeded.

  /api/s/{publicId}/responses:
    post:
      tags: [Public survey]
      summary: Submit or resume a response (planned)
      description: |
        Stamps the `surveyVersion` being answered so the response keeps its
        meaning if the survey is later edited. Idempotent per recipient when
        `oneResponsePerRecipient` is set.
      operationId: submitResponse
      security: []
      parameters:
        - name: publicId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                token: { type: string }
                answers:
                  type: object
                  additionalProperties: true
                  description: Map of questionId to answer value.
                complete:
                  type: boolean
                  default: true
                  description: False saves progress without completing.
      responses:
        "201": { description: Response recorded. }
        "400": { description: An answer failed its question's validation rules. }
        "409": { description: This recipient has already responded. }
        "429": { description: Rate limit exceeded. }

  /api/webhooks/twilio:
    post:
      tags: [Webhooks]
      summary: Twilio delivery status callback (planned)
      description: Updates the matching `Communication` row. Signature-verified.
      operationId: twilioWebhook
      security: []
      responses:
        "204": { description: Accepted. }
        "403": { description: Signature verification failed. }

  /api/exports/surveys/{surveyId}/responses.csv:
    get:
      tags: [Export]
      summary: Export responses as CSV (planned)
      description: |
        Authorized and workspace-scoped before a single row is written. Columns
        come from the survey version each response was answered against.
      operationId: exportResponsesCsv
      parameters:
        - name: surveyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: CSV file.
          content:
            text/csv:
              schema: { type: string }
        "403": { description: Role lacks response:export. }
        "404": { description: No such survey in this workspace. }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: surveyflow_session
      description: |
        httpOnly session cookie issued at sign-in. Identifies the *user* only —
        the workspace comes from the URL slug plus a membership check on every
        request.

security:
  - sessionCookie: []
